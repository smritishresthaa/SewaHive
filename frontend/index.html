<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2fae5e" />
    <meta name="description" content="Connect with trusted service providers in your neighborhood. Book cleaning, plumbing, repairs and more." />
    <meta name="keywords" content="service marketplace, home services, booking, Nepal" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SewaHive" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-512.png" />
    <title>SewaHive</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
            colors: {
              brand: {
                50:'#effaf2',
                100:'#d8f2de',
                200:'#b4e5c3',
                300:'#89d3a3',
                400:'#5cc080',
                500:'#2fae5e',
                600:'#238c4b',
                700:'#1c6c3b',
                800:'#164f2b',
                900:'#103620'
              }
            }
          }
        }
      }
    </script>

    <!-- Google Identity Services SDK (no inline init) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      html, body, #root { height: 100%; }
      body {
        font-family: Inter, sans-serif;
        background: #fff;
        color: #111827;
      }
      html { scroll-behavior: smooth; }
      .brand-gradient {
        background-image: linear-gradient(135deg, #1c6c3b 0%, #2fae5e 100%);
      }
      
      /* ============================== */
      /* 🗺️ LEAFLET CRITICAL OVERRIDES */
      /* Prevent Tailwind CDN from shattering maps */
      /* ============================== */
      .leaflet-container { z-index: 0 !important; }
      .leaflet-container img {
        max-width: none !important;
        max-height: none !important;
        object-fit: unset !important;
      }
    </style>
    <!-- 🗺️ Load Leaflet CSS globally to ensure maps render on all pages -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
